name: Test (with Unity)

# Installs a real Unity Editor (via the official Unity CLI, https://docs.unity.com/en-us/unity-cli)
# and activates a Unity Personal license, so the tests that only run their full assertions
# when Unity is available (see tests/UnityPackageToVpm.Tests/UnityAvailability.cs) actually
# exercise batchmode instead of falling back to the "Unity not found" branch.
#
# The Unity-specific steps live in .github/actions/setup-unity-cli and
# .github/actions/activate-unity-license. Requires the UNITY_SERIAL / UNITY_EMAIL /
# UNITY_PASSWORD repository secrets.
on:
  workflow_dispatch:
    inputs:
      unity_version:
        description: "Unity version to install (e.g. lts, 6000.3.20f1)"
        required: false
        default: "2022.3.22f1"

jobs:
  test-with-unity:
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: osx-arm64
            os: macos-latest
          - rid: osx-x64
            os: macos-26-intel
          - rid: win-x64
            os: windows-latest
          - rid: linux-x64
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: global.json

      - name: Install vpm CLI
        shell: bash
        run: |
          dotnet tool install --global vrchat.vpm.cli
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Setup Unity CLI
        id: unity-path
        uses: yamachu/unity-cli-actions/setup-unity-cli@015b047be9d1021d44269fb81270b9627cda574b
        with:
          unity-version: ${{ github.event.inputs.unity_version || '2022.3.22f1' }}

      - name: Activate Unity Personal license
        uses: yamachu/unity-cli-actions/activate-unity-license@015b047be9d1021d44269fb81270b9627cda574b
        with:
          editor-path: ${{ steps.unity-path.outputs.editor-path }}
          serial: ${{ secrets.UNITY_SERIAL }}
          username: ${{ secrets.UNITY_EMAIL }}
          password: ${{ secrets.UNITY_PASSWORD }}

      - name: Diagnose raw batchmode invocation
        if: always()
        run: |
          mkdir -p /tmp/diag-project/Assets
          set +e
          "${{ steps.unity-path.outputs.editor-path }}" -batchmode -nographics -quit \
            -projectPath /tmp/diag-project -logFile /tmp/diag-project/unity.log
          exit_code=$?
          set -e
          echo "exit code: $exit_code"
          echo "--- unity.log ---"
          cat /tmp/diag-project/unity.log || echo "(no log file was written)"

      - name: Run tests
        env:
          UNITY_PATH: ${{ steps.unity-path.outputs.editor-path }}
        run: dotnet test tests/UnityPackageToVpm.Tests --configuration Release
