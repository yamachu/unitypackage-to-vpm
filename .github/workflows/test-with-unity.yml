name: Test (with Unity)

# Opt-in only (never runs on push/PR): installs a real Unity Editor via the official
# Unity CLI (https://docs.unity.com/en-us/unity-cli) using a service-account login, so the
# tests that only run their full assertions when Unity is available (see
# tests/UnityPackageToVpm.Tests/UnityAvailability.cs) actually exercise batchmode instead
# of falling back to the "Unity not found" branch. Requires the UNITY_CLIENT_ID /
# UNITY_CLIENT_SECRET repository secrets (a Unity service account's client-id/secret pair,
# see https://docs.unity.com/en-us/unity-cli/unity-cli-reference for `unity auth login`).
on:
  workflow_dispatch:
    inputs:
      unity_version:
        description: "Unity version to install (e.g. lts, 6000.3.20f1)"
        required: false
        default: "lts"
  # 一度発火させてPR状態でもworkflow_dispatchが使えるようになったら、pushトリガーを削除する
  push:

jobs:
  test-with-unity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: global.json

      - name: Install vpm CLI
        shell: bash
        run: |
          dotnet tool install --global vrchat.vpm.cli
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Install Unity CLI
        run: curl -fsSL https://public-cdn.cloud.unity3d.com/hub/prod/cli/install.sh | UNITY_CLI_CHANNEL=beta bash

      - name: Sign in and install Unity Editor
        env:
          UNITY_CLIENT_ID: ${{ secrets.UNITY_CLIENT_ID }}
          UNITY_CLIENT_SECRET: ${{ secrets.UNITY_CLIENT_SECRET }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        run: |
          export PATH="$HOME/.unity/bin:$PATH"
          # --no-store keeps the session in-process only, so a later `unity` invocation
          # (a separate process) sees no session at all ("Sign in with `unity auth login`").
          # Persist to the keyring instead — the earlier keyring-write failure was specific
          # to a bare local Docker container without a keyring/secret-service backend; a
          # real GitHub Actions VM may have one available.
          unity auth login --client-id "$UNITY_CLIENT_ID" --client-secret "$UNITY_CLIENT_SECRET" --non-interactive
          # `--personal` was rejected outright for a service-account identity ("Sign in with
          # `unity auth login`, or pass --serial..." — Personal is tied to a human Unity ID).
          # Activate with the serial extracted from an existing local .ulf instead. This is a
          # clean CI runner (no pre-existing .ulf), unlike the local-machine test that hit
          # "Token not found in cache" — that error may have been caused by a conflicting
          # already-loaded local license context.
          unity license activate --serial "$UNITY_SERIAL" --accept-eula --non-interactive
          unity install "${{ github.event.inputs.unity_version || 'lts' }}" -y --accept-eula --non-interactive
          unity editors -i
          unity license

      - name: Locate installed Unity executable
        id: unity-path
        run: |
          editor_path=$(find "$HOME/Unity/Hub/Editor" -maxdepth 3 -type f -name Unity | head -1)
          if [ -z "$editor_path" ]; then
            echo "Could not find an installed Unity executable under \$HOME/Unity/Hub/Editor" >&2
            exit 1
          fi
          echo "path=$editor_path" >> "$GITHUB_OUTPUT"

      - name: Diagnose raw batchmode invocation
        if: always()
        run: |
          mkdir -p /tmp/diag-project/Assets
          set +e
          "${{ steps.unity-path.outputs.path }}" -batchmode -nographics -quit \
            -projectPath /tmp/diag-project -logFile /tmp/diag-project/unity.log
          exit_code=$?
          set -e
          echo "exit code: $exit_code"
          echo "--- unity.log ---"
          cat /tmp/diag-project/unity.log || echo "(no log file was written)"

      - name: Run tests
        env:
          UNITY_PATH: ${{ steps.unity-path.outputs.path }}
        run: dotnet test tests/UnityPackageToVpm.Tests --configuration Release
