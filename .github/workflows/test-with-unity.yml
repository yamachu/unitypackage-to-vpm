name: Test (with Unity)

# Opt-in: installs a real Unity Editor (via the official Unity CLI,
# https://docs.unity.com/en-us/unity-cli, used only to download/install the Editor — no
# sign-in needed for that) and activates a Unity Personal license, so the tests that only
# run their full assertions when Unity is available (see
# tests/UnityPackageToVpm.Tests/UnityAvailability.cs) actually exercise batchmode instead
# of falling back to the "Unity not found" branch.
#
# Licensing: a Unity CLI service-account identity has no Personal-license entitlement of
# its own — `unity license activate --personal`, `--serial <personal serial>`, and loading
# an existing .ulf offline via `-manualLicenseFile` (rejected with "Machine bindings don't
# match" even for a real, currently-active .ulf) were all dead ends, confirmed on a clean
# runner. What actually works, matching game-ci/unity-builder's approach
# (https://github.com/game-ci/unity-builder/blob/main/dist/platforms/ubuntu/steps/activate.sh,
# https://github.com/game-ci/unity-builder/blob/main/dist/platforms/ubuntu/entrypoint.sh):
# randomize /etc/machine-id, then activate live against Unity's servers using the classic
# Editor flags `-serial -username -password` with a real human Unity ID (not a service
# account) and the Personal-tier serial extracted from an existing .ulf. Requires the
# UNITY_SERIAL / UNITY_EMAIL / UNITY_PASSWORD repository secrets.
on:
  workflow_dispatch:
    inputs:
      unity_version:
        description: "Unity version to install (e.g. lts, 6000.3.20f1)"
        required: false
        default: "lts"
  # 一度発火させてPR状態でもworkflow_dispatchが使えるようになったら、pushトリガーを削除する
  push:

jobs:
  test-with-unity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: global.json

      - name: Install vpm CLI
        shell: bash
        run: |
          dotnet tool install --global vrchat.vpm.cli
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Install Unity CLI
        run: curl -fsSL https://public-cdn.cloud.unity3d.com/hub/prod/cli/install.sh | UNITY_CLI_CHANNEL=beta bash

      - name: Install Unity Editor
        run: |
          export PATH="$HOME/.unity/bin:$PATH"
          unity install "${{ github.event.inputs.unity_version || '2022.3.22f1' }}" -y --accept-eula --non-interactive
          unity editors -i

      - name: Locate installed Unity executable
        id: unity-path
        run: |
          editor_path=$(find "$HOME/Unity/Hub/Editor" -maxdepth 3 -type f -name Unity | head -1)
          if [ -z "$editor_path" ]; then
            echo "Could not find an installed Unity executable under \$HOME/Unity/Hub/Editor" >&2
            exit 1
          fi
          echo "path=$editor_path" >> "$GITHUB_OUTPUT"

      # https://github.com/game-ci/unity-builder/blob/main/dist/platforms/ubuntu/entrypoint.sh
      - name: Randomize machine-id
        run: |
          new_id=$(python3 -c "import uuid; print(uuid.uuid4().hex)")
          echo "$new_id" | sudo tee /etc/machine-id
          cat /etc/machine-id

      # https://github.com/game-ci/unity-builder/blob/main/dist/platforms/ubuntu/steps/activate.sh
      - name: Activate Unity Personal license
        env:
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        run: |
          mkdir -p /tmp/blank-project/Assets
          attempt=1
          delay=15
          until "${{ steps.unity-path.outputs.path }}" \
            -logFile /dev/stdout \
            -quit \
            -serial "$UNITY_SERIAL" \
            -username "$UNITY_EMAIL" \
            -password "$UNITY_PASSWORD" \
            -projectPath /tmp/blank-project \
            -batchmode
          do
            if [ "$attempt" -ge 5 ]; then
              echo "License activation failed after $attempt attempts" >&2
              exit 1
            fi
            echo "Activation attempt $attempt failed, retrying in ${delay}s..."
            sleep "$delay"
            delay=$((delay * 2))
            attempt=$((attempt + 1))
          done

      - name: Diagnose raw batchmode invocation
        if: always()
        run: |
          mkdir -p /tmp/diag-project/Assets
          set +e
          "${{ steps.unity-path.outputs.path }}" -batchmode -nographics -quit \
            -projectPath /tmp/diag-project -logFile /tmp/diag-project/unity.log
          exit_code=$?
          set -e
          echo "exit code: $exit_code"
          echo "--- unity.log ---"
          cat /tmp/diag-project/unity.log || echo "(no log file was written)"

      - name: Run tests
        env:
          UNITY_PATH: ${{ steps.unity-path.outputs.path }}
        run: dotnet test tests/UnityPackageToVpm.Tests --configuration Release
