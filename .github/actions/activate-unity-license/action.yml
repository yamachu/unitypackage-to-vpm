name: Activate Unity Personal License
description: >
  Activates a Unity Personal license against Unity's servers for use in CI,
  following game-ci/unity-builder's approach
  (https://github.com/game-ci/unity-builder/blob/main/dist/platforms/ubuntu/steps/activate.sh,
  https://github.com/game-ci/unity-builder/blob/main/dist/platforms/ubuntu/entrypoint.sh):
  randomize /etc/machine-id, then activate live using the classic Editor flags
  `-serial -username -password`. Requires a real human Unity ID (not a service
  account — those have no Personal-license entitlement) and the Personal-tier
  serial extracted from an existing .ulf.

inputs:
  editor-path:
    description: "Absolute path to the Unity executable to activate"
    required: true
  serial:
    description: "Unity Personal-tier serial"
    required: true
  username:
    description: "Unity ID email"
    required: true
  password:
    description: "Unity ID password"
    required: true

runs:
  using: composite
  steps:
    # https://github.com/game-ci/unity-builder/blob/main/dist/platforms/ubuntu/entrypoint.sh
    - name: Randomize machine-id
      shell: bash
      run: |
        new_id=$(python3 -c "import uuid; print(uuid.uuid4().hex)")
        echo "$new_id" | sudo tee /etc/machine-id
        cat /etc/machine-id

    # https://github.com/game-ci/unity-builder/blob/main/dist/platforms/ubuntu/steps/activate.sh
    - name: Activate Unity Personal license
      shell: bash
      env:
        UNITY_SERIAL: ${{ inputs.serial }}
        UNITY_EMAIL: ${{ inputs.username }}
        UNITY_PASSWORD: ${{ inputs.password }}
      run: |
        mkdir -p /tmp/blank-project/Assets
        attempt=1
        delay=15
        until "${{ inputs.editor-path }}" \
          -logFile /dev/stdout \
          -quit \
          -serial "$UNITY_SERIAL" \
          -username "$UNITY_EMAIL" \
          -password "$UNITY_PASSWORD" \
          -projectPath /tmp/blank-project \
          -batchmode -nographics
        do
          if [ "$attempt" -ge 5 ]; then
            echo "License activation failed after $attempt attempts" >&2
            exit 1
          fi
          echo "Activation attempt $attempt failed, retrying in ${delay}s..."
          sleep "$delay"
          delay=$((delay * 2))
          attempt=$((attempt + 1))
        done
